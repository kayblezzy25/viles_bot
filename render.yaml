services:
  - type: web
    name: telegram-channel-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python webhook_bot.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: WEBHOOK_URL
        fromService:
          name: telegram-channel-bot
          type: web
          property: host
