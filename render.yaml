# Render.com deployment configuration
# Using Docker to ensure Python 3.11 (avoids Python 3.14 compatibility issues)

services:
  - type: worker
    name: telegram-ai-content-bot
    runtime: docker
    plan: free  # Change to 'standard' for 24/7 operation
    envVars:
      - key: BOT_TOKEN
        sync: false  # Set this in Render dashboard
      - key: OPENAI_API_KEY
        sync: false  # Set this in Render dashboard
      - key: DATABASE_URL
        sync: false  # Set this in Render dashboard (optional, defaults to SQLite)
    autoDeploy: true
